kind = "web"
previewPath = "/"
title = "Happy 19th Birthday — Devadharshini"
version = "1.0.0"
id = "artifacts/birthday"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23508

[services.development]
run = "pnpm --filter @workspace/birthday run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/birthday", "run", "build" ]
publicDir = "artifacts/birthday/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23508"
BASE_PATH = "/"
